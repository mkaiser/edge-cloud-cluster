global:
  tls:
    # -- WARNING: You need to set this value with a valid FQDN
    hostname: ryax.ecc73.cape-project.eu
    enabled: true
    environment: stg  # creates letsencrypt-stg (avoids conflict with cluster letsencrypt-staging); cert issuer updated by scripts/environment/updateConfigFromProjectSettings.sh
  monitoring:
    enabled: true
  # Use node-local storage for all Ryax PVCs — keeps edge worker data off Longhorn
  # so it is never included in cluster-wide snapshot/backup jobs.
  defaultStorageClass: local-path

# Restrict all Ryax workloads to edge worker nodes only.
# Edge nodes carry node-role.kubernetes.io/edge-worker=true (set in 2_joinCluster.sh).
# Cloud CP and cloud workers do not have this label.
nodeSelector:
  node.kubernetes.io/edge-worker: "true"

certManager:
  enabled: true  # creates letsencrypt-stg; HAProxy cert comes from cluster letsencrypt-staging (see haproxy-ingress.yaml)

registry:
  ingress:
    enabled: true
  nodeSelector:
    node.kubernetes.io/edge-worker: "true"

traefik:
  ingressClass:
    isDefaultClass: false
  service:
    type: ClusterIP
  nodeSelector:
    node.kubernetes.io/edge-worker: "true"

kube-prometheus-stack:
  enabled: true

  crds:
    upgradeJob:
      # Pin to CP so the job doesn't land on the worker where kubelet log proxy
      # returns 502 (k3s tunnel not fully established) and image pulls are slow.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"

  prometheusOperator:
    # Restrict to ryaxns only — prevents conflict with the main kube-prometheus-stack
    # operator in the prometheus namespace.
    namespaces:
      releaseNamespace: true
      additional: []
    admissionWebhooks:
      enabled: false
      patch:
        enabled: false
    tls:
      enabled: false

  nodeExporter:
    # kube-prometheus-stack already deploys node-exporter cluster-wide.
    # Disabling prevents hostPort conflicts on all nodes.
    enabled: false

  alertmanager:
    enabled: true
    alertmanagerSpec:
      nodeSelector:
        node.kubernetes.io/edge-worker: "true"
      priorityClassName: monitoring
    config:
      global:
        resolve_timeout: 5m
        # -- enable Slack alerting for the cluster
        slack_api_url:
      inhibit_rules:
      - equal:
        - namespace
        - alertname
        source_matchers:
        - "severity = critical"
        target_matchers:
        - "severity =~ warning|info"
      - equal:
        - namespace
        - alertname
        source_matchers:
        - "severity = warning"
        target_matchers:
        - "severity = info"
      - equal:
        - namespace
        source_matchers:
        - "alertname = InfoInhibitor"
        target_matchers:
        - "severity = info"

      # -- Uncomment this for Slack monitoring
      # route:
      #   receiver: 'slack-notifications'
