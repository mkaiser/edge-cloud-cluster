# Sync hook (wave -1): deletes Helm-auto-generated secrets so the
# SealedSecret controller can take ownership.
#
# ROOT CAUSE OF CONFLICT:
#   The GitLab Helm chart's shared-secrets PreSync job auto-generates plain
#   Secrets for gitlab-root-password and gitlab-rails-secrets. Running our
#   cleanup as PreSync is too early — shared-secrets fires after us and
#   recreates them. Running as a Sync hook at wave -1 means: all PreSync
#   hooks (including shared-secrets) finish first, then we delete the plain
#   secrets, then the SealedSecrets (wave 0) are applied.
#
# FIX:
#   Sync hook at wave -1 deletes the Helm-generated secrets right before
#   the SealedSecrets (wave 0) are applied. The sealed-secrets controller
#   then creates them cleanly with correct ownership.
#   Safe on re-syncs — delete --ignore-not-found is a no-op if absent.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-cleanup-helm-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 2000
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: argocd-application-controller
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/alpine/k8s:1.36.0
        command: ["/bin/sh", "-ec"]
        args:
        - |
          # Ensure gitlab namespace exists (no-op if already present)
          kubectl create namespace gitlab --dry-run=client -o yaml | kubectl apply -f -
          echo "Deleting Helm-generated secrets (if present)..."
          kubectl delete secret gitlab-root-password   -n gitlab --ignore-not-found=true
          kubectl delete secret gitlab-rails-secrets   -n gitlab --ignore-not-found=true
          echo "Done. SealedSecret controller will create them with correct ownership."
