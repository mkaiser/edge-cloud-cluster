---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-runner-secrets-bootstrap
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitlab-runner-secrets-bootstrap
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "create"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitlab-runner-secrets-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitlab-runner-secrets-bootstrap
subjects:
- kind: ServiceAccount
  name: gitlab-runner-secrets-bootstrap
  namespace: gitlab
---
# PostSync: creates/updates gitlab-runner-token and gitlab-runner-cache-s3
# in the gitlab-runner namespace — fully automated, no sealed secrets needed.
#
# Runner token flow (GitLab 18.0+):
#   1. Read root password from gitlab-root-password secret (managed by SealedSecret)
#   2. If no users exist (migrations pod restarted and skipped seeding), run db:seed
#   3. Create a PAT via rails runner → call /api/v4/user/runners → get glrt- token
#   4. Write the token to gitlab-runner-token secret
#
# S3 cache credentials are read from the gitlab-s3-connection secret.
# Idempotent: safe to re-run on every sync / domain change.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-runner-secrets-bootstrap
  namespace: gitlab
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  activeDeadlineSeconds: 2000
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: gitlab-runner-secrets-bootstrap
      restartPolicy: OnFailure
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: bootstrap
        image: docker.io/alpine/k8s:1.36.1
        env:
        - name: GITLAB_URL
          value: "http://gitlab-webservice-default.gitlab.svc.cluster.local:8080"
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu
          DST_NS="gitlab-runner"

          echo "Ensuring namespace ${DST_NS} exists..."
          kubectl get namespace "${DST_NS}" >/dev/null 2>&1 || kubectl create namespace "${DST_NS}"

          echo "Reading root credentials..."
          ROOT_PASS=$(kubectl -n gitlab get secret gitlab-root-password \
            -o jsonpath='{.data.password}' | base64 -d)
          ROOT_EMAIL=$(kubectl -n gitlab get secret gitlab-root-password \
            -o jsonpath='{.data.email}' | base64 -d)
          if [ -z "$ROOT_EMAIL" ]; then
            echo "ERROR: gitlab-root-password secret missing 'email' key — re-run sealSecrets.sh"
            exit 1
          fi

          echo "Waiting for GitLab API..."
          i=1
          while [ "$i" -le 60 ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${GITLAB_URL}/-/readiness")
            [ "$code" = "200" ] && break
            echo "Try ${i}/60: GitLab not ready (HTTP ${code}), retrying in 10s..."
            i=$((i + 1)); sleep 10
          done

          # --- Ensure root user exists ---
          # When the migrations pod restarts, gitlab:db:configure skips db:seed, leaving
          # no users. In GitLab 18.x, Users::CreateService requires organization_id; plain
          # User.new + save or db:seed do not work. Use CreateService directly.
          USER_COUNT=$(kubectl -n gitlab exec deploy/gitlab-toolbox -c toolbox -- \
            gitlab-rails runner "puts User.count" 2>/dev/null | tail -1 | tr -d ' \r\n')
          if [ "${USER_COUNT:-0}" = "0" ]; then
            echo "No users found — creating root user via Users::CreateService..."
            kubectl -n gitlab exec deploy/gitlab-toolbox -c toolbox -- \
              gitlab-rails runner \
              "org=Organizations::Organization.default_organization; r=Users::CreateService.new(User.new(admin:true),{username:'root',name:'Administrator',email:'${ROOT_EMAIL}',password:'${ROOT_PASS}',password_confirmation:'${ROOT_PASS}',admin:true,skip_confirmation:true,organization_id:org.id,organization_access_level: :owner}).execute; puts r.success? ? 'created' : r.message" \
              2>/dev/null | tail -1
          else
            echo "Found ${USER_COUNT} user(s), skipping creation."
          fi

          # --- Create PAT via rails runner ---
          echo "Creating PAT via toolbox..."
          PAT_NAME="runner-bootstrap-$(date +%s)"
          API_TOKEN=$(kubectl -n gitlab exec deploy/gitlab-toolbox -c toolbox -- \
            gitlab-rails runner \
            "u=User.find_by(admin:true)||User.find_by(username:'root'); t=u.personal_access_tokens.create!(name:'${PAT_NAME}',scopes:['api'],expires_at:1.year.from_now); puts t.token" \
            2>/dev/null | tail -1)

          if [ -z "$API_TOKEN" ]; then
            echo "ERROR: Could not obtain API token"
            exit 1
          fi
          echo "API token obtained."

          # --- Create instance runner via API ---
          echo "Creating instance runner via API..."
          RUNNER_RESP=$(curl -sf -X POST "${GITLAB_URL}/api/v4/user/runners" \
            -H "PRIVATE-TOKEN: ${API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"runner_type":"instance_type","description":"k8s-instance-runner","tag_list":[]}' 2>/dev/null || true)

          RUNNER_TOKEN=$(echo "$RUNNER_RESP" | \
            sed -n 's/.*"token":"\([^"]*\)".*/\1/p' | head -1)

          if [ -z "$RUNNER_TOKEN" ]; then
            echo "ERROR: Could not create runner token. Response: $RUNNER_RESP"
            exit 1
          fi
          echo "Runner token obtained (${RUNNER_TOKEN:0:10}...)."

          echo "Creating/updating ${DST_NS}/gitlab-runner-token..."
          kubectl -n "${DST_NS}" create secret generic gitlab-runner-token \
            --from-literal=runner-registration-token="" \
            --from-literal=runner-token="${RUNNER_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # --- S3 cache credentials from gitlab-s3-connection ---
          echo "Reading S3 credentials from gitlab-s3-connection..."
          S3_CONN=$(kubectl -n gitlab get secret gitlab-s3-connection \
            -o jsonpath='{.data.connection}' | base64 -d)

          ACCESS_KEY=$(echo "$S3_CONN" | sed -n 's/.*aws_access_key_id:[[:space:]]*//p' | head -1 | tr -d '"')
          SECRET_KEY=$(echo "$S3_CONN" | sed -n 's/.*aws_secret_access_key:[[:space:]]*//p' | head -1 | tr -d '"')

          if [ -z "$ACCESS_KEY" ] || [ -z "$SECRET_KEY" ]; then
            echo "ERROR: Could not parse S3 keys"
            exit 1
          fi

          echo "Creating/updating ${DST_NS}/gitlab-runner-cache-s3..."
          kubectl -n "${DST_NS}" create secret generic gitlab-runner-cache-s3 \
            --from-literal=accessKey="${ACCESS_KEY}" \
            --from-literal=secretKey="${SECRET_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "GitLab Runner bootstrap completed successfully."
