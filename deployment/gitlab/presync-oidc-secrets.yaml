# PreSync: generate gitlab-oidc-client-secret and gitlab-oidc-provider secrets.
#
# Replaces the sealed secret approach — no cluster-specific data needs to be
# encrypted and committed. The OIDC client secret is generated once and
# preserved across syncs; the provider config is rebuilt from plain env vars
# on every sync so URL changes (e.g. new cluster domain) are applied automatically.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-oidc-presync
  namespace: gitlab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-oidc-presync
  namespace: gitlab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["gitlab-oidc-client-secret", "gitlab-oidc-provider"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]   # resourceNames cannot restrict create (resource has no name yet)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-oidc-presync
  namespace: gitlab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-oidc-presync
subjects:
- kind: ServiceAccount
  name: gitlab-oidc-presync
  namespace: gitlab
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-oidc-presync
  namespace: gitlab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: gitlab-oidc-presync
      restartPolicy: OnFailure
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: oidc-presync
        image: docker.io/alpine/k8s:1.36.1
        env:
        - name: GITLAB_URL
          value: "https://gitlab.ecc76.your-domain.tld"
        - name: KEYCLOAK_ISSUER
          value: "https://id.ecc76.your-domain.tld/realms/opendesk"
        command: ["/bin/sh", "-ec"]
        args:
        - |
          NS="gitlab"

          # Generate OIDC client secret on first install; preserve on upgrades.
          if kubectl get secret gitlab-oidc-client-secret -n "$NS" &>/dev/null; then
            CLIENT_SECRET=$(kubectl get secret gitlab-oidc-client-secret -n "$NS" \
              -o jsonpath='{.data.client-secret}' | base64 -d)
            echo "OIDC client secret already exists — reusing."
          else
            CLIENT_SECRET=$(dd if=/dev/urandom bs=32 count=1 2>/dev/null | od -A n -t x1 | tr -d ' \n')
            kubectl create secret generic gitlab-oidc-client-secret \
              -n "$NS" \
              --from-literal=client-secret="$CLIENT_SECRET"
            echo "OIDC client secret generated."
          fi

          # Build provider config and create/update the secret.
          # Note: printf keeps all content inside the YAML block scalar indentation.
          # (A heredoc with 0-indent terminator would prematurely end the YAML block.)
          PROVIDER=$(printf '%s\n' \
            'name: openid_connect' \
            'label: "Nubus SSO"' \
            'args:' \
            '  name: openid_connect' \
            '  scope:' \
            '    - openid' \
            '    - profile' \
            '    - email' \
            '  response_type: code' \
            "  issuer: ${KEYCLOAK_ISSUER}" \
            '  discovery: true' \
            '  client_auth_method: query' \
            '  uid_field: preferred_username' \
            '  pkce: true' \
            '  client_options:' \
            '    identifier: gitlab' \
            "    secret: ${CLIENT_SECRET}" \
            "    redirect_uri: ${GITLAB_URL}/users/auth/openid_connect/callback")

          if kubectl get secret gitlab-oidc-provider -n "$NS" &>/dev/null; then
            kubectl patch secret gitlab-oidc-provider -n "$NS" \
              --type=merge \
              -p "{\"data\":{\"provider\":\"$(echo "$PROVIDER" | base64 | tr -d '\n')\"}}"
            echo "gitlab-oidc-provider updated."
          else
            kubectl create secret generic gitlab-oidc-provider \
              -n "$NS" \
              --from-literal=provider="$PROVIDER"
            echo "gitlab-oidc-provider created."
          fi
