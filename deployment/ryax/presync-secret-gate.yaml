# PreSync gate: fast-fail if ryax-datastore-secret doesn't exist yet.
#
# Prevents the fresh-install migration deadlock:
#   On hook syncs, Ryax's migration PreSync jobs need ryax-datastore-secret to
#   connect to the database. On a fresh install this secret only exists after an
#   apply-only sync (step 1). Without this gate, the migration jobs hang for
#   minutes waiting for a DB connection, blocking the sync with no clear error.
#
# This gate exits 1 immediately when the secret is absent, causing ArgoCD to
# mark the sync as Failed cleanly rather than hanging. The ryax-install-sync-guard
#   orchestrates the correct sequence: apply sync first (creates the secret),
#   then hook sync (migrations succeed).
#
# NOTE: apply-strategy syncs skip ALL PreSync hooks, so this gate never blocks
# the intentional apply-only step 1. It only fires on hook syncs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ryax-secret-gate
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ryax-secret-gate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["ryax-datastore-secret"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ryax-secret-gate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ryax-secret-gate
subjects:
- kind: ServiceAccount
  name: ryax-secret-gate
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ryax-secret-gate
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  activeDeadlineSeconds: 30
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: ryax-secret-gate
      restartPolicy: Never
      containers:
      - name: gate
        image: docker.io/alpine/k8s:1.36.1
        command: ["/bin/sh", "-ec"]
        args:
        - |
          if kubectl get secret ryax-datastore-secret -n ryaxns &>/dev/null; then
            echo "ryax-datastore-secret exists — migrations may proceed."
            exit 0
          fi
          echo "ERROR: ryax-datastore-secret not found."
          echo "An apply-only sync must run first to initialise chart resources."
          echo "The ryax-install-sync-guard handles this automatically."
          exit 1
