---
# PreSync gate: block Ryax sync until the core apps are all Synced + Healthy.
# Ryax is wave 9 / manual-sync-only, so this only runs when an operator
# explicitly triggers a sync — the check confirms the cluster is ready.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ryax-presync-check
  namespace: ryaxns
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ryax-presync-check
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ryax-presync-check
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ryax-presync-check
subjects:
- kind: ServiceAccount
  name: ryax-presync-check
  namespace: ryaxns
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ryax-wait-cluster-healthy
  namespace: ryaxns
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: ryax-presync-check
      restartPolicy: Never
      containers:
      - name: check
        image: docker.io/alpine/k8s:1.32.3
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu
          # Apps that must be Synced + Healthy before Ryax is allowed to sync.
          REQUIRED_APPS="opendesk gitlab gitlab-runner kube-prometheus-stack"

          echo "Waiting for core apps to be Synced + Healthy..."
          i=0
          MAX=180  # 180 × 10s = 30 minutes
          while [ "$i" -lt "$MAX" ]; do
            all_ok=true
            for app in $REQUIRED_APPS; do
              sync=$(kubectl -n argocd get application "$app" \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "NotFound")
              health=$(kubectl -n argocd get application "$app" \
                -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
              if [ "$sync" != "Synced" ] || [ "$health" != "Healthy" ]; then
                echo "  [$app] sync=$sync health=$health — not ready"
                all_ok=false
              else
                echo "  [$app] sync=$sync health=$health — OK"
              fi
            done

            if [ "$all_ok" = "true" ]; then
              echo "All required apps are Synced + Healthy. Proceeding with Ryax sync."
              exit 0
            fi

            i=$((i + 1))
            echo "Attempt ${i}/${MAX} — retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Core apps did not reach Synced+Healthy within 30 minutes."
          exit 1
