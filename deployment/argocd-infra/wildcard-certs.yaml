# Wildcard TLS certificate for infra services.
# cert-manager issues this via Let's Encrypt DNS-01 (Hetzner webhook).
# HAProxy uses this as its default SSL certificate (--default-ssl-certificate).
#
# infra-wildcard-tls  → *.cape-project.eu  (argocd, grafana, prometheus, hello-argo, etc.)
# *.cape-project.eu is handled by OpenDesk's own opendesk-certificates chart.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: infra-wildcard
  namespace: argocd
spec:
  secretName: infra-wildcard-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - "*.ecc66.cape-project.eu"
