# Self-managed ArgoCD Application.
# After the initial Pulumi bootstrap, ArgoCD reconciles its own Helm release.
# Values are split across dedicated folders:
#   deployment/argocd-infra/values.yaml — ArgoCD core config (server, controller, redis)
#   deployment/opendesk-cmp/values.yaml — openDesk helmfile sidecar + secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
  annotations:
    # ArgoCD manages itself — pause automated sync briefly on upgrades to avoid
    # a mid-upgrade self-termination. Operator should manually sync for version bumps.
    argocd.argoproj.io/refresh-interval: "5m"
spec:
  project: default
  sources:
    - repoURL: git@github.com:orga/repo.git
      targetRevision: main
      ref: values
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "9.5.20" # renovate: datasource=helm depName=argo-cd registryUrl=https://argoproj.github.io/argo-helm
      helm:
        releaseName: argocd
        valueFiles:
          - $values/deployment/argocd-infra/values.yaml
          - $values/deployment/opendesk-cmp/values.yaml
    # Plain manifests: OIDC sealed secret
    - repoURL: git@github.com:orga/repo.git
      targetRevision: main
      path: deployment/argocd-infra
      directory:
        exclude: '{values.yaml,argocd-self.yaml,wildcard-certs.yaml,pvc.yaml,*.template,*.sh}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
