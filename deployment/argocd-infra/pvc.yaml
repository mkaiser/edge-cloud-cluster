# Persistent helm chart cache for the CMP helmfile sidecar.
# Survives pod restarts so charts don't need to be re-downloaded on every sync.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: argocd-helm-cache
  namespace: argocd
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
