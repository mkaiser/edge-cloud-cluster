apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ssd-test-pvc
  namespace: storage-test
spec:
  storageClassName: hcloud-nfs-ssd-volumes
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Mi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssd-test-script
  namespace: storage-test
data:
  run.sh: |
    #!/bin/sh
    set -e
    DATAFILE=/data/persistence-test.log

    echo "=== $(date -Iseconds) | Pod start ===" >> "$DATAFILE"
    echo "Pod: $HOSTNAME" >> "$DATAFILE"

    COUNT=$(grep -c "Pod start" "$DATAFILE" || true)
    echo ""
    echo "✓ Volume is mounted and writable"
    echo "✓ This pod has started $COUNT time(s) — data persists across restarts"
    echo ""
    echo "--- Full log ($DATAFILE) ---"
    cat "$DATAFILE"
    echo "---"

    # Keep running so the pod stays up for inspection
    tail -f /dev/null

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssd-test
  namespace: storage-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ssd-test
  template:
    metadata:
      labels:
        app: ssd-test
    spec:
      containers:
      - name: tester
        image: busybox:1.36
        command: ["sh", "/scripts/run.sh"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: script
          mountPath: /scripts
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ssd-test-pvc
      - name: script
        configMap:
          name: ssd-test-script
          defaultMode: 0755
