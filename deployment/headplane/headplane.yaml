# Headplane — admin GUI for Headscale
# Deployed at https://headplane.ecc76.your-domain.tld/admin/
# Uses the same OIDC client as headscale for reliable user matching.
# Connects to headscale via internal cluster service URL.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headplane-config
  namespace: headscale
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 3000
      base_url: "https://headplane.ecc76.your-domain.tld"
      cookie_secure: true
      cookie_domain: "headplane.ecc76.your-domain.tld"
      cookie_max_age: 86400
      cookie_secret_path: "/etc/headplane/secrets/cookie-secret"
      data_path: "/data"

    headscale:
      url: "http://headscale:8080"
      api_key_path: "/etc/headplane/secrets/api-key"
      config_strict: false

    oidc:
      issuer: "https://id.ecc76.your-domain.tld/realms/opendesk"
      client_id: "headscale"
      # Read directly from the sealed OIDC secret to avoid PostSync timing races.
      client_secret_path: "/etc/headplane/oidc/client-secret"
      # Required by current Headplane OIDC validation (deprecated in favor of headscale.api_key_path).
      headscale_api_key_path: "/etc/headplane/secrets/api-key"

    integration:
      kubernetes:
        # Explicitly disable k8s integration for this topology (headscale runs in a different pod).
        enabled: false
        pod_name: "headplane"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headplane
  namespace: headscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headplane
  namespace: headscale
rules:
# Headplane needs to read headscale pods and trigger restarts
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headplane
  namespace: headscale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headplane
subjects:
- kind: ServiceAccount
  name: headplane
  namespace: headscale
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane
  namespace: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headplane
    spec:
      serviceAccountName: headplane
      initContainers:
      - name: wait-for-headplane-api-key
        image: busybox:1.38
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu
          for i in $(seq 1 240); do
            if [ -s /etc/headplane/secrets/api-key ]; then
              echo "headplane-secrets.api-key is present"
              exit 0
            fi
            echo "Waiting for headplane-secrets.api-key... ($i/240)"
            sleep 5
          done
          echo "ERROR: headplane-secrets.api-key not available after 20 minutes"
          exit 1
        volumeMounts:
        - name: secrets
          mountPath: /etc/headplane/secrets
          readOnly: true
      containers:
      - name: headplane
        image: ghcr.io/tale/headplane:0.6.3
        ports:
        - containerPort: 3000
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/headplane/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: secrets
          mountPath: /etc/headplane/secrets
          readOnly: true
        - name: data
          mountPath: /data
        - name: oidc-client-secret
          mountPath: /etc/headplane/oidc
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /admin/healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /admin/healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: headplane-config
      - name: secrets
        # headplane-secrets is seeded with cookie-secret by the PreSync bootstrap job.
        # api-key and oidc-client-secret are added by the PostSync job.
        # The secret always exists by Sync time (cookie-secret key at minimum).
        secret:
          secretName: headplane-secrets
      - name: data
        persistentVolumeClaim:
          claimName: headplane-data
      - name: oidc-client-secret
        secret:
          secretName: headscale-oidc-client-secret
          items:
          - key: client-secret
            path: client-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headplane-data
  namespace: headscale
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: headplane
  namespace: headscale
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: headplane
  ports:
  - port: 3000
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headplane
  namespace: headscale
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
spec:
  ingressClassName: haproxy
  tls:
  - hosts:
    - headplane.ecc76.your-domain.tld
    secretName: infra-wildcard-tls
  rules:
  - host: headplane.ecc76.your-domain.tld
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headplane
            port:
              name: http
