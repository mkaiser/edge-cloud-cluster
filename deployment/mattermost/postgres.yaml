---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-postgresql
  namespace: mattermost
spec:
  selector:
    app: mattermost-postgresql
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mattermost-postgresql
  namespace: mattermost
spec:
  serviceName: mattermost-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: mattermost-postgresql
  template:
    metadata:
      labels:
        app: mattermost-postgresql
    spec:
      containers:
      - name: postgresql
        # renovate: datasource=docker depName=postgres
        image: postgres:18-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: mattermost
        - name: POSTGRES_USER
          value: mattermost
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mattermost-db
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: [pg_isready, -U, mattermost]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 8Gi
