# Registers the "mattermost" OIDC client in the openDesk Keycloak realm.
# PostSync hook — runs after all resources are synced.
# Redirect URI uses /signup/openid/complete (Mattermost native OIDC, not GitLab OAuth2).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mattermost-keycloak-setup
  namespace: mattermost
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mattermost-keycloak-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["opendesk-keycloak-bootstrap-admin-creds"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mattermost-keycloak-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mattermost-keycloak-setup
subjects:
- kind: ServiceAccount
  name: mattermost-keycloak-setup
  namespace: mattermost
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mattermost-keycloak-client-setup
  namespace: mattermost
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: mattermost-keycloak-setup
      restartPolicy: OnFailure
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: keycloak-client-setup
        image: docker.io/alpine/k8s:1.36.1
        env:
        - name: KEYCLOAK_URL
          value: "http://ums-keycloak.opendesk.svc.cluster.local:8080"
        - name: REALM
          value: "opendesk"
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mattermost-oidc
              key: client-id
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: mattermost-oidc
              key: client-secret
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu

          echo "Waiting for Keycloak opendesk realm..."
          for i in $(seq 1 120); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "${KEYCLOAK_URL}/realms/opendesk" || true)
            [ "$STATUS" = "200" ] && { echo "Realm ready."; break; }
            echo "  Attempt $i/120 — status=${STATUS}, waiting 10s..."
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "ERROR: realm not ready"; exit 1; }

          echo "Reading Keycloak admin credentials..."
          ADMIN_YAML=$(kubectl get secret opendesk-keycloak-bootstrap-admin-creds \
            -n opendesk -o jsonpath='{.data.admin\.yaml}' | base64 -d)
          KC_ADMIN_USER=$(echo "$ADMIN_YAML" | grep 'username:' | awk '{print $2}')
          KC_ADMIN_PASS=$(echo "$ADMIN_YAML" | grep 'password:' | awk '{print $2}')
          [ -n "$KC_ADMIN_USER" ] || { echo "ERROR: no admin user"; exit 1; }

          echo "Obtaining admin token..."
          TOKEN=$(curl -sf -X POST \
            "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
            -d "client_id=admin-cli" \
            -d "username=${KC_ADMIN_USER}" \
            -d "password=${KC_ADMIN_PASS}" \
            -d "grant_type=password" | \
            sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
          [ -n "$TOKEN" ] || { echo "ERROR: no admin token"; exit 1; }

          EXISTING=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}")
          CLIENT_UUID=$(echo "$EXISTING" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)

          CLIENT_JSON='{
            "clientId": "'"${CLIENT_ID}"'",
            "protocol": "openid-connect",
            "publicClient": false,
            "clientAuthenticatorType": "client-secret",
            "secret": "'"${CLIENT_SECRET}"'",
            "standardFlowEnabled": true,
            "directAccessGrantsEnabled": false,
            "serviceAccountsEnabled": false,
            "redirectUris": [
              "https://chat.ecc76.your-domain.tld/signup/gitlab/complete",
              "https://chat.ecc76.your-domain.tld/login/gitlab/complete"
            ],
            "webOrigins": [
              "https://chat.ecc76.your-domain.tld"
            ],
            "defaultClientScopes": ["openid", "profile", "email"]
          }'

          if [ -n "$CLIENT_UUID" ] && [ "$CLIENT_UUID" != "[]" ]; then
            echo "Client exists (${CLIENT_UUID}), updating..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${CLIENT_JSON}" \
              "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${CLIENT_UUID}")
          else
            echo "Creating client..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${CLIENT_JSON}" \
              "${KEYCLOAK_URL}/admin/realms/${REALM}/clients")
          fi

          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] \
            && echo "Keycloak client '${CLIENT_ID}' configured (HTTP ${HTTP_CODE})." \
            || { echo "ERROR: Keycloak API returned HTTP ${HTTP_CODE}"; exit 1; }
