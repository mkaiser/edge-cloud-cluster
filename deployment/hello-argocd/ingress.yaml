# Ingress for hello-world — routes hello-argo.ecc66.cape-project.eu to the hello-world service.
# TLS is provided by a pre-issued wildcard certificate secret.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world-ingress
  namespace: hello-argocd
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  ingressClassName: haproxy
  rules:
  - host: hello-argo.ecc66.cape-project.eu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello-world
            port:
              number: 80
  tls:
  - hosts:
    - hello-argo.ecc66.cape-project.eu
    secretName: infra-wildcard-tls
