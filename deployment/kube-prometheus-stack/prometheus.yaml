apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "85.4.0" # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts
    helm:
      values: |
        prometheusOperator:
          # Restrict operator to prometheus namespace only.
          # Prevents conflict with Ryax's bundled prometheus-operator in ryaxns.
          namespaces:
            releaseNamespace: true
            additional: []
          admissionWebhooks:
            # Admission webhook Jobs use Helm hooks that ArgoCD cannot track reliably —
            # the Job completes and is GC'd before ArgoCD polls it, causing a permanent
            # stuck sync. cert-manager handles TLS for webhooks instead.
            enabled: false
            patch:
              enabled: false
          tls:
            enabled: false
        grafana:
          admin:
            existingSecret: kube-prometheus-stack-grafana
            userKey: admin-user
            passwordKey: admin-password
          grafana.ini:
            users:
              allow_sign_up: false
            auth:
              disable_login_form: false
              disable_initial_admin_creation: false
            security:
              disable_initial_admin_password_change: true
          sidecar:
            dashboards:
              searchNamespace: ALL  # discover dashboard ConfigMaps from all namespaces
          # Dashboards imported from grafana.com — check each gnetId for latest revision
          dashboards:
            default:
              argocd:
                gnetId: 14584
                revision: 10
                datasource: Prometheus
              external-dns:
                gnetId: 15038
                revision: 3
                datasource: Prometheus
              cert-manager:
                gnetId: 20842
                revision: 2
                datasource: Prometheus
              haproxy-ingress:
                gnetId: 12693
                revision: 2
                datasource: Prometheus
              wireguard:
                gnetId: 12177
                revision: 1
                datasource: Prometheus
              headscale:
                gnetId: 20614
                revision: 1
                datasource: Prometheus
              gitlab-overview:
                gnetId: 2662
                revision: 4
                datasource: Prometheus
          ingress:
            enabled: true
            ingressClassName: haproxy
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-staging"
              haproxy-ingress.github.io/ssl-redirect: "true"
            hosts:
              - grafana.ecc76.your-domain.tld
            tls:
              - hosts:
                  - grafana.ecc76.your-domain.tld
                secretName: grafana-tls
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
        # ServiceMonitors for components deployed by Pulumi (or wave-1 apps).
        # These live here (not in Pulumi/wave-1) because the CRD doesn't exist until
        # the kube-prometheus-stack Helm chart is deployed.
        additionalServiceMonitors:
          - name: external-dns
            namespace: prometheus
            selector:
              matchLabels:
                app.kubernetes.io/name: external-dns
            namespaceSelector:
              matchNames:
                - external-dns
            endpoints:
              - port: http
                interval: 30s
          - name: cert-manager
            namespace: prometheus
            selector:
              matchLabels:
                app.kubernetes.io/name: cert-manager
                app.kubernetes.io/component: controller
            namespaceSelector:
              matchNames:
                - cert-manager
            endpoints:
              - port: http-metrics
                path: /metrics
                interval: 60s
          - name: haproxy-ingress
            namespace: prometheus
            selector:
              matchLabels:
                app.kubernetes.io/name: haproxy-ingress
            namespaceSelector:
              matchNames:
                - haproxy-ingress
            endpoints:
              - port: stat
                path: /metrics
                interval: 30s
          - name: wireguard
            namespace: prometheus
            selector:
              matchLabels:
                app: wireguard
            namespaceSelector:
              matchNames:
                - wireguard-infra
            endpoints:
              - port: metrics
                path: /metrics
                interval: 30s
          - name: headscale
            namespace: prometheus
            selector:
              matchLabels:
                app.kubernetes.io/instance: headscale
                app.kubernetes.io/name: headscale
            namespaceSelector:
              matchNames:
                - headscale
            endpoints:
              - port: http
                path: /metrics
                interval: 30s

        prometheus:
          ingress:
            enabled: true
            ingressClassName: haproxy
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-staging"
              haproxy-ingress.github.io/ssl-redirect: "true"
            hosts:
              - prometheus.ecc76.your-domain.tld
            tls:
              - hosts:
                  - prometheus.ecc76.your-domain.tld
                secretName: prometheus-tls
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"

        alertmanager:
          config:
            global:
              resolve_timeout: 5m
              smtp_from: 'no-reply@your-domain.tld'
              smtp_smarthost: 'mail.your-server.de:587'
              smtp_require_tls: true
              smtp_auth_username: 'no-reply@your-domain.tld'
              smtp_auth_password: '3_W/KTQxQ3PJk'
            inhibit_rules:
              - equal: [namespace, alertname]
                source_matchers: ["severity = critical"]
                target_matchers: ["severity =~ warning|info"]
              - equal: [namespace, alertname]
                source_matchers: ["severity = warning"]
                target_matchers: ["severity = info"]
              - equal: [namespace]
                source_matchers: ["alertname = InfoInhibitor"]
                target_matchers: ["severity = info"]
            receivers:
              - name: "null"
              - name: email
                email_configs:
                  - to: 'mail@domain.tld"'
                    send_resolved: false
                    headers:
                      Subject: '[Longhorn] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}'
            route:
              receiver: "null"
              group_by: [alertname, namespace]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 24h
              routes:
                - matchers: ['alertname = "Watchdog"']
                  receiver: "null"
                - matchers: ['alertname =~ "Longhorn.*"']
                  receiver: email

        additionalPrometheusRulesMap:
          longhorn-backup:
            groups:
              - name: longhorn.backup
                rules:
                  - alert: LonghornBackupJobFailed
                    expr: |
                      kube_job_status_failed{
                        namespace="longhorn-system",
                        job_name=~"backup-daily-.*"
                      } > 0
                      unless kube_job_status_active{
                        namespace="longhorn-system",
                        job_name=~"backup-daily-.*"
                      } > 0
                    for: 2m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Longhorn daily backup failed"
                      description: "Job {{ $labels.job_name }} in longhorn-system has failed pods."

  # Prometheus CRD (>= kube-prometheus-stack 60.x / prometheus-operator 0.73+) has
  # spec.hostNetwork which ArgoCD's schema cache may not know about, causing the
  # structured-merge-diff calculation to fail with "field not declared in schema".
  # Workaround: skip SMD for monitoring.coreos.com CRs by ignoring their spec fields.
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: Prometheus
      jqPathExpressions:
        - .spec.hostNetwork
    - group: monitoring.coreos.com
      kind: Alertmanager
      jqPathExpressions:
        - .spec.hostNetwork
  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
