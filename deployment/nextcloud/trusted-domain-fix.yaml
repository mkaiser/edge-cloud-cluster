# Nextcloud trusted_domains + Redis self-healing fix.
#
# Problem: on a fresh cluster the opendesk Nextcloud pod crashes before the DB is
# ready. During the crash cycle it writes a minimal config.php with only `localhost`
# in trusted_domains and no Redis/memcache settings. On the next (successful) start
# the entrypoint sees config.php already on disk and skips regeneration, leaving
# the stale values.
#
# Fix: use PHP to patch config.php directly on every ArgoCD sync.
# occ config:system:set is blocked by config_is_read_only in this image.
# config.php is owned by nginx (r--r-----); the owner can chmod their own file,
# so we temporarily unlock it, patch all settings, and restore read-only.
# No pod restart needed. Idempotent.
#
# The PHP script is stored in a ConfigMap and piped into the Nextcloud pod via
# kubectl exec -i to avoid shell-escaping issues.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextcloud-config-fix-script
  namespace: opendesk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  fix.php: |
    <?php
    require '/var/www/html/config/config.php';
    $redis_user = getenv('FS_ENV_REDIS_USER');
    $CONFIG['redis'] = array(
        'host'     => getenv('FS_ENV_REDIS_HOST') ?: 'redis-headless',
        'port'     => intval(getenv('FS_ENV_REDIS_PORT') ?: 6379),
        'timeout'  => intval(getenv('FS_ENV_REDIS_TIMEOUT') ?: 30),
        'dbindex'  => intval(getenv('FS_ENV_REDIS_DBINDEX') ?: 0),
        'password' => getenv('FS_ENV_REDIS_PASSWORD') ?: '',
    );
    if ($redis_user !== false && $redis_user !== '') {
        $CONFIG['redis']['user'] = $redis_user;
    }
    $CONFIG['memcache.distributed'] = '\OC\Memcache\Redis';
    $CONFIG['memcache.locking']     = '\OC\Memcache\Redis';
    $CONFIG['memcache.local']       = '\OC\Memcache\APCu';
    $CONFIG['filelocking.enabled']  = true;
    $CONFIG['config_is_read_only']  = false;
    $CONFIG['allow_local_remote_servers'] = true;
    $domain = getenv('FS_ENV_TRUSTED_DOMAINS') ?: '';
    if ($domain) {
        $CONFIG['trusted_domains']   = [$domain];
        $CONFIG['overwrite.cli.url'] = 'https://' . $domain;
        $CONFIG['overwriteprotocol'] = getenv('FS_ENV_OVERWRITE_PROTOCOL') ?: 'https';
    }
    if (file_put_contents('/var/www/html/config/config.php',
            '<?php' . PHP_EOL . '$CONFIG = ' . var_export($CONFIG, true) . ';' . PHP_EOL) === false) {
        fwrite(STDERR, "file_put_contents failed\n");
        exit(1);
    }
    echo 'Config updated from env vars.' . PHP_EOL;
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextcloud-trusted-domain-fix
  namespace: opendesk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextcloud-trusted-domain-fix
  namespace: opendesk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-trusted-domain-fix
  namespace: opendesk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nextcloud-trusted-domain-fix
subjects:
- kind: ServiceAccount
  name: nextcloud-trusted-domain-fix
  namespace: opendesk
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-trusted-domain-fix
  namespace: opendesk
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: nextcloud-trusted-domain-fix
      restartPolicy: Never
      volumes:
      - name: fix-script
        configMap:
          name: nextcloud-config-fix-script
      containers:
      - name: fix
        image: docker.io/alpine/k8s:1.36.1
        volumeMounts:
        - name: fix-script
          mountPath: /scripts
        command: ["/bin/sh", "-ec"]
        args:
        - |
          NS="opendesk"

          # Find a running nextcloud pod
          POD=$(kubectl get pods -n "$NS" \
            -l "app.kubernetes.io/name=aio,app.kubernetes.io/instance=opendesk-nextcloud" \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [ -z "$POD" ]; then
            echo "No running nextcloud pod found — skipping (will retry on next sync)."
            exit 0
          fi

          echo "Nextcloud pod: $POD"

          # Temporarily make config.php writable (owner can chmod without write perm).
          kubectl exec -n "$NS" "$POD" -- chmod 640 /var/www/html/config/config.php

          # Copy the PHP fix script into the pod and run it.
          # env vars (FS_ENV_*) are already set in the pod — the script reads them directly.
          kubectl exec -i -n "$NS" "$POD" -- sh -c "cat > /tmp/nc-config-fix.php" < /scripts/fix.php
          kubectl exec -n "$NS" "$POD" -- php /tmp/nc-config-fix.php

          # Restore read-only.
          kubectl exec -n "$NS" "$POD" -- chmod 440 /var/www/html/config/config.php

          echo "Done — config patched (trusted_domains, Redis, memcache)."
