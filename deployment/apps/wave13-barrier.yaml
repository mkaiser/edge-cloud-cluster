# Wave 13 Sync barrier: waits until ALL wave-12 ArgoCD Applications are
# Synced + Healthy + NotProgressing before ArgoCD advances to wave 14 (cp-tailscale, headplane).
#
# Wave 12 contains: headscale. Must be Healthy before cp-tailscale and headplane
# deploy, since headplane is the management UI for headscale.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wave13-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wave13-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wave13-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wave13-barrier
subjects:
- kind: ServiceAccount
  name: wave13-barrier
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wave13-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "13"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # 60 min — nextcloud and xwiki can be slow on cold NFS
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: wave13-barrier
      restartPolicy: Never
      containers:
      - name: barrier
        image: docker.io/alpine/k8s:1.36.0
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Wave-13 barrier: discovering argocd-main-app applications at wave 12..."

          # Only look at apps directly owned by argocd-main-app.
          # opendesk child apps have their own internal wave numbers — wave 4
          # there means collabora/xwiki etc, NOT argocd-main-app wave 4 (headscale).
          APPS=$(kubectl get applications -n argocd -o json | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              ann = item.get('metadata', {}).get('annotations', {})
              wave = ann.get('argocd.argoproj.io/sync-wave', '')
              tracking = ann.get('argocd.argoproj.io/tracking-id', '')
              parent = tracking.split(':')[0] if tracking else ''
              if parent == 'argocd-main-app' and wave == '12':
                  print(item['metadata']['name'])
          ")

          echo "Waiting for: $(echo $APPS | tr '\n' ' ')"

          i=0
          while [ "$i" -lt 360 ]; do
            ALL_READY=true
            for APP in $APPS; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || true)
              PHASE=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
              if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && \
                 { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "SyncOk" ] || [ -z "$PHASE" ]; }; then
                : # ready
              else
                ALL_READY=false
                echo "  ${APP}: sync=${SYNC} health=${HEALTH} phase=${PHASE}"
              fi
            done

            if [ "$ALL_READY" = "true" ]; then
              echo "All argocd-main-app wave-12 Applications are Synced+Healthy+NotProgressing — releasing wave 14."
              exit 0
            fi

            echo "Attempt $i/360 — not all ready, waiting 10s..."
            sleep 10
            i=$((i+1))
          done

          echo "ERROR: Not all argocd-main-app wave-12 Applications reached Synced+Healthy+Completed within 60 minutes"
          exit 1
