# Wave 19 Sync barrier: waits until wave-18 (gitlab, gitlab-runner) are Synced+Healthy
# before advancing to wave 22 (barrier before mattermost/zulip).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wave19-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "19"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wave19-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "19"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wave19-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "19"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wave19-barrier
subjects:
- kind: ServiceAccount
  name: wave19-barrier
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wave19-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: wave19-barrier
      restartPolicy: Never
      containers:
      - name: barrier
        image: docker.io/alpine/k8s:1.36.1
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Wave-19 barrier: discovering applications with sync-wave=18..."

          APPS=$(kubectl get applications -n argocd -o json | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              ann = item.get('metadata', {}).get('annotations', {})
              wave = ann.get('argocd.argoproj.io/sync-wave', '')
              tracking = ann.get('argocd.argoproj.io/tracking-id', '')
              parent = tracking.split(':')[0] if tracking else ''
              if parent == 'argocd-main-app' and wave == '18':
                  print(item['metadata']['name'])
          ")

          echo "Waiting for: $(echo $APPS | tr '\n' ' ')"

          i=0
          while [ "$i" -lt 360 ]; do
            PENDING=""
            for APP in $APPS; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || true)
              PHASE=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
              if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && \
                 { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "SyncOk" ] || [ -z "$PHASE" ]; }; then
                : # ready
              else
                PENDING="${PENDING} ${APP}(sync=${SYNC},health=${HEALTH},phase=${PHASE})"
              fi
            done

            if [ -z "$PENDING" ]; then
              echo "All wave-18 Applications are Synced+Healthy — releasing wave 20+."
              exit 0
            fi

            echo "Attempt $i/360 — waiting for:${PENDING}"
            sleep 10
            i=$((i+1))
          done

          echo "ERROR: timed out waiting for:${PENDING}"
          exit 1
