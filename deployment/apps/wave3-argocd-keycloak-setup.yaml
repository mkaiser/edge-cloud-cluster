# Registers the "argocd" OIDC client in the openDesk Keycloak realm.
# Runs as a Sync hook at wave 3 — after wave2-barrier has confirmed opendesk
# (including Keycloak) is Synced+Healthy. Moved from argocd-infra PostSync
# to avoid a deadlock where the job polled for Keycloak before opendesk started.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-keycloak-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-keycloak-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["opendesk-keycloak-bootstrap-admin-creds", "argocd-oidc-client-secret"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-keycloak-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-keycloak-setup
subjects:
- kind: ServiceAccount
  name: argocd-keycloak-setup
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-keycloak-client-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: argocd-keycloak-setup
      restartPolicy: OnFailure
      containers:
      - name: keycloak-client-setup
        image: docker.io/alpine/k8s:1.32.3
        env:
        - name: KEYCLOAK_URL
          # Use internal service: /admin/ is not exposed through the ingress (only /realms/ is)
          value: "http://ums-keycloak.argocd.svc.cluster.local:8080"
        - name: REALM
          value: "opendesk"
        - name: CLIENT_ID
          value: "argocd"
        - name: ARGOCD_URL
          value: "https://argocd.test34.your-domain.tld"
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: argocd-oidc-client-secret
              key: oidc.clientSecret
              optional: true  # Secret created by sealSecrets.sh — skip gracefully if not yet sealed
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu

          if [ -z "${CLIENT_SECRET:-}" ]; then
            echo "SKIP: argocd-oidc-client-secret not found — run deployment/argocd/sealSecrets.sh to enable SSO."
            echo "ArgoCD will retry this job on the next sync after the secret is committed."
            exit 0
          fi

          # wave2-barrier already confirmed opendesk is Synced+Healthy, but poll briefly
          # to confirm the realm endpoint is responding before hitting the admin API.
          echo "Waiting for Keycloak opendesk realm to be ready..."
          for i in $(seq 1 120); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              "${KEYCLOAK_URL}/realms/opendesk" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Realm opendesk is ready."
              break
            fi
            echo "  Attempt $i/120 — realm status=${STATUS}, waiting 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: opendesk realm not ready after 20 minutes"
            exit 1
          fi

          echo "Reading Keycloak admin credentials..."
          ADMIN_YAML=$(kubectl get secret opendesk-keycloak-bootstrap-admin-creds \
            -n argocd -o jsonpath='{.data.admin\.yaml}' | base64 -d)
          KC_ADMIN_USER=$(echo "$ADMIN_YAML" | grep 'username:' | awk '{print $2}')
          KC_ADMIN_PASS=$(echo "$ADMIN_YAML" | grep 'password:' | awk '{print $2}')

          if [ -z "$KC_ADMIN_USER" ] || [ -z "$KC_ADMIN_PASS" ]; then
            echo "ERROR: Could not read Keycloak admin credentials"
            exit 1
          fi

          echo "Obtaining Keycloak admin token..."
          TOKEN=$(curl -sf -X POST \
            "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
            -d "client_id=admin-cli" \
            -d "username=${KC_ADMIN_USER}" \
            -d "password=${KC_ADMIN_PASS}" \
            -d "grant_type=password" | \
            sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to obtain admin token"
            exit 1
          fi
          echo "Admin token obtained."

          # Check if client already exists
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT_ID}")

          CLIENT_UUID=$(echo "$EXISTING" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)

          CLIENT_JSON='{
            "clientId": "'"${CLIENT_ID}"'",
            "protocol": "openid-connect",
            "publicClient": false,
            "clientAuthenticatorType": "client-secret",
            "secret": "'"${CLIENT_SECRET}"'",
            "standardFlowEnabled": true,
            "directAccessGrantsEnabled": false,
            "serviceAccountsEnabled": false,
            "redirectUris": [
              "'"${ARGOCD_URL}"'/auth/callback"
            ],
            "webOrigins": [
              "'"${ARGOCD_URL}"'"
            ],
            "defaultClientScopes": ["openid", "profile", "email"],
            "optionalClientScopes": ["groups"]
          }'

          if [ -n "$CLIENT_UUID" ] && [ "$CLIENT_UUID" != "[]" ]; then
            echo "Client '${CLIENT_ID}' exists (UUID: ${CLIENT_UUID}), updating..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${CLIENT_JSON}" \
              "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${CLIENT_UUID}")
          else
            echo "Client '${CLIENT_ID}' does not exist, creating..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${CLIENT_JSON}" \
              "${KEYCLOAK_URL}/admin/realms/${REALM}/clients")
          fi

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Keycloak client '${CLIENT_ID}' configured successfully (HTTP ${HTTP_CODE})."
          else
            echo "ERROR: Keycloak API returned HTTP ${HTTP_CODE}"
            exit 1
          fi
