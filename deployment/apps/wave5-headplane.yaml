# ArgoCD Application: headplane
# Admin GUI for Headscale, accessible at https://headplane.test34.your-domain.tld/admin/
# Depends on headplane-secrets (api-key key) being seeded by the headscale App's PostSync job.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headplane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: git@github.com:owner/repo.git
      targetRevision: main
      path: deployment/headplane

  destination:
    server: https://kubernetes.default.svc
    namespace: headscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
