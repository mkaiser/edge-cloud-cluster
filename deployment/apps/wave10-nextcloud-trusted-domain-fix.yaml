# ArgoCD Application: Nextcloud trusted_domains self-healing fix.
# Wave 10 — fires after the wave-9 barrier confirms opendesk (including
# nextcloud) is fully Synced+Healthy.
#
# On every sync, a Sync hook Job calls `occ config:system:set` to write
# trusted_domains directly into Nextcloud's DB-backed config layer.
# No pod restart needed; survives crash cycles on fresh clusters.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-trusted-domain-fix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: git@github.com:orga/repo.git
    targetRevision: main
    path: deployment/nextcloud
  destination:
    server: https://kubernetes.default.svc
    namespace: opendesk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
