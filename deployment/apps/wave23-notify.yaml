# Final PostSync notification: all sync waves complete.
# Checks argocd-main-app is Synced+Healthy before sending.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notify-final
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "23"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notify-final
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "23"
rules:

- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["smtp-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notify-final
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "23"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notify-final
subjects:
- kind: ServiceAccount
  name: notify-final
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notify-final
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "23"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: notify-final
      restartPolicy: Never
      containers:
      - name: notify
        image: docker.io/alpine/k8s:1.36.1
        env:
        - name: NOTIFY_TO
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: sendBootstrapFinishMailRecipient
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: port
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: password
        command: ["/bin/sh", "-ec"]
        args:
        - |
          # This job is a PostSync hook on argocd-main-app — it only runs after
          # the sync has already completed, so checking argocd-main-app status
          # here would deadlock (app is OutOfSync while hooks are running).
          echo "Cluster fully ready — sending notification."

          python3 - <<PYEOF
          import smtplib, os, time
          from email.message import EmailMessage

          to       = os.environ["NOTIFY_TO"]
          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ.get("SMTP_USERNAME", "")
          password = os.environ.get("SMTP_PASSWORD", "")

          msg = EmailMessage()
          msg["Subject"] = "ecc76.your-domain.tld Cluster bootstrap complete"
          msg["From"]    = "no-reply@your-domain.tld"
          msg["To"]      = to
          msg.set_content(
              "All ArgoCD sync waves have completed successfully.\n\n"
              "The cluster is fully ready:\n"
              "  - Monitoring:    https://prometheus.ecc76.your-domain.tld\n"
              "                   https://grafana.ecc76.your-domain.tld\n"
              "  - OpenDesk:      https://portal.ecc76.your-domain.tld\n"
              "  - Keycloak:      https://id.ecc76.your-domain.tld\n"
              "  - GitLab:        https://gitlab.ecc76.your-domain.tld\n"
              "  - Headplane:     https://headplane.ecc76.your-domain.tld/admin\n"
              "  - VPN:           https://vpn.ecc76.your-domain.tld\n"
              "  - Ryax:          https://ryax.ecc76.your-domain.tld\n"
              "  - Mattermost:    https://chat.ecc76.your-domain.tld\n"
              "  - ArgoCD:        https://argocd.ecc76.your-domain.tld\n"
              "  - Longhorn:      https://longhorn.ecc76.your-domain.tld\n"
          )

          for attempt in range(1, 11):
              try:
                  with smtplib.SMTP(host, port, timeout=10) as s:
                      s.ehlo(); s.starttls()
                      if username:
                          s.login(username, password)
                      s.send_message(msg)
                  print(f"Notification sent to {to}")
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/10 failed: {e}")
                  if attempt < 10:
                      time.sleep(30)
          else:
              raise RuntimeError("Failed to send notification after 10 attempts")
          PYEOF
