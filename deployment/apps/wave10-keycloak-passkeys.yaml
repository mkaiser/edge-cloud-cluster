# ArgoCD Application: Keycloak passkey (WebAuthn Passwordless) configuration
# Wave 10 — fires after opendesk/nubus is fully Healthy+Synced, so Keycloak
# is guaranteed to be running before the PostSync Job attempts the Admin API.
#
# Idempotent: the job checks for existing flow/executions before creating them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-passkeys
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: git@github.com:orga/repo.git
    targetRevision: main
    path: deployment/keycloak-passkeys
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
