# Wave 5 Sync barrier: waits until k3s-upgrade-plans is Synced+Healthy, then
# actively uncordons any remaining cordoned nodes before releasing wave 6.
#
# Active uncordon is required for single-node k3s: when k3s restarts during a
# SUC upgrade job the job pod is killed before it can uncordon, leaving the node
# permanently cordoned. This barrier recovers that state automatically.
# It is also safe when the plan version <= node version (no-op upgrade): plans
# become Healthy immediately, the uncordon is a no-op, wave 6 proceeds.
#
# Wave 4 is dedicated to the k3s upgrade sequence:
#   wave 2: system-upgrade-controller (provides Plan CRD)
#   wave 4: k3s-upgrade-plans (applies Plans → SUC upgrades, cordons)
#   wave 5: this barrier (plans healthy → uncordon all nodes → release wave 6)
#   wave 6: opendesk-cmp (safe to start now that nodes are Ready)
#
# ClusterRole (not Role) required: node patch (uncordon) is cluster-scoped.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wave5-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wave5-barrier
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wave5-barrier
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wave5-barrier
subjects:
- kind: ServiceAccount
  name: wave5-barrier
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wave5-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: wave5-barrier
      restartPolicy: Never
      containers:
      - name: barrier
        image: docker.io/alpine/k8s:1.36.1
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Wave-5 barrier: discovering applications with sync-wave=1..."

          APPS=$(kubectl get applications -n argocd -o json | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              ann = item.get('metadata', {}).get('annotations', {})
              wave = ann.get('argocd.argoproj.io/sync-wave', '')
              tracking = ann.get('argocd.argoproj.io/tracking-id', '')
              parent = tracking.split(':')[0] if tracking else ''
              if parent == 'argocd-main-app' and wave == '4':
                  print(item['metadata']['name'])
          ")

          echo "Waiting for: $(echo $APPS | tr '\n' ' ')"

          i=0
          while [ "$i" -lt 360 ]; do
            PENDING=""
            for APP in $APPS; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || true)
              PHASE=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
              if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && \
                 { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "SyncOk" ] || [ -z "$PHASE" ]; }; then
                : # ready
              else
                PENDING="${PENDING} ${APP}(sync=${SYNC},health=${HEALTH},phase=${PHASE})"
              fi
            done

            if [ -z "$PENDING" ]; then
              echo "All argocd-main-app wave-4 Applications are Synced+Healthy+NotProgressing."
              break
            fi

            echo "Attempt $i/360 — waiting for:${PENDING}"
            sleep 10
            i=$((i+1))
          done

          if [ -n "$PENDING" ]; then
            echo "ERROR: timed out waiting for:${PENDING}"
            exit 1
          fi

          PRE_CORDONED=$(kubectl get configmap cordoned-before-upgrade -n argocd \
            -o jsonpath='{.data.nodes}' 2>/dev/null || true)
          echo "Nodes manually cordoned before upgrade: '${PRE_CORDONED}'"

          echo "Uncordoning nodes cordoned by the upgrade (skipping manually cordoned nodes)..."
          CORDONED_NODES=$(kubectl get nodes -o jsonpath='{range .items[?(@.spec.unschedulable==true)]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
          if [ -n "$CORDONED_NODES" ]; then
            for NODE in $CORDONED_NODES; do
              if echo " ${PRE_CORDONED} " | grep -qF " ${NODE} "; then
                echo "  Skipping ${NODE} — was manually cordoned before upgrade."
              else
                kubectl uncordon "$NODE" && echo "  Uncordoned ${NODE}." || echo "  WARNING: uncordon ${NODE} failed — continuing."
              fi
            done
          else
            echo "  No cordoned nodes — nothing to do."
          fi

          echo "Waiting for all nodes to be Ready..."
          i=0
          while [ "$i" -lt 60 ]; do
            NOT_READY=$(kubectl get nodes --no-headers 2>/dev/null \
              | grep -v " Ready " | wc -l | tr -d ' ')
            if [ "$NOT_READY" = "0" ]; then
              echo "All nodes Ready — releasing wave 6."
              exit 0
            fi
            echo "  not-ready=${NOT_READY}, waiting 10s... ($i/60)"
            sleep 10
            i=$((i+1))
          done

          echo "ERROR: nodes did not become Ready within 10 minutes"
          exit 1
