# Wave 1 Sync barrier: waits until all wave-0 Applications are Synced+Healthy
# before advancing to wave 2.
#
# Longhorn readiness (engine images + DaemonSet) is verified by Pulumi during
# cluster setup — no need to re-check it here.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wave1-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wave1-barrier
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wave1-barrier
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wave1-barrier
subjects:
- kind: ServiceAccount
  name: wave1-barrier
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wave1-barrier
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: wave1-barrier
      restartPolicy: Never
      containers:
      - name: barrier
        image: docker.io/alpine/k8s:1.36.1
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Wave-1 barrier: discovering applications with sync-wave=0..."

          APPS=$(kubectl get applications -n argocd -o json | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              ann = item.get('metadata', {}).get('annotations', {})
              wave = ann.get('argocd.argoproj.io/sync-wave', '')
              tracking = ann.get('argocd.argoproj.io/tracking-id', '')
              parent = tracking.split(':')[0] if tracking else ''
              if parent == 'argocd-main-app' and wave == '0':
                  print(item['metadata']['name'])
          ")

          echo "Waiting for: $(echo $APPS | tr '\n' ' ')"

          i=0
          while [ "$i" -lt 90 ]; do
            PENDING=""
            for APP in $APPS; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || true)
              PHASE=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
              if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && \
                 { [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "SyncOk" ] || [ -z "$PHASE" ]; }; then
                : # ready
              else
                PENDING="${PENDING} ${APP}(sync=${SYNC},health=${HEALTH},phase=${PHASE})"
              fi
            done

            if [ -z "$PENDING" ]; then
              echo "All wave-0 Applications Synced+Healthy."
              break
            fi

            echo "Attempt $i/90 — waiting for:${PENDING}"
            sleep 10
            i=$((i+1))
          done

          if [ -n "$PENDING" ]; then
            echo "ERROR: timed out waiting for:${PENDING}"
            exit 1
          fi
