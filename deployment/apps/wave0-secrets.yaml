# ArgoCD Application: shared cluster secrets
# Deploys sealed secrets shared across multiple apps (SMTP, etc.).
# Wave 0 — must be ready before opendesk-cmp (wave 0) and all app deployments.
# See deployment/secrets/sealSecrets.sh to create/update secrets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: git@github.com:owner/repo.git
    targetRevision: main
    path: deployment/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
