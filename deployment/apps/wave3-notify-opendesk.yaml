# PostSync notification: sends an email when OpenDesk is ready.
# Fires at PostSync wave 3, after wave2-barrier confirmed opendesk is
# Synced+Healthy (all child apps: Keycloak, LDAP, portal, etc.).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notify-opendesk
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notify-opendesk
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  resourceNames: ["opendesk"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["smtp-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: notify-opendesk-rollout
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notify-opendesk
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notify-opendesk
subjects:
- kind: ServiceAccount
  name: notify-opendesk
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: notify-opendesk-rollout
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: notify-opendesk-rollout
subjects:
- kind: ServiceAccount
  name: notify-opendesk
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notify-opendesk
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 2700
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: notify-opendesk
      restartPolicy: Never
      containers:
      - name: notify
        image: docker.io/alpine/k8s:1.32.3
        env:
        - name: NOTIFY_TO
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: sendBootstrapFinishMailRecipient
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: port
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: password
        command: ["/bin/sh", "-ec"]
        args:
        - |
          APP="opendesk"
          echo "Waiting for ${APP} to be Synced+Healthy..."
          i=0
          while [ "$i" -lt 270 ]; do
            SYNC=$(kubectl get application "$APP" -n argocd \
              -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
            HEALTH=$(kubectl get application "$APP" -n argocd \
              -o jsonpath="{.status.health.status}" 2>/dev/null || true)
            PHASE=$(kubectl get application "$APP" -n argocd \
              -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
            [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && [ "$PHASE" != "Running" ] && break
            echo "  Attempt $i/270 — sync=${SYNC} health=${HEALTH} phase=${PHASE}, waiting 10s..."
            sleep 10; i=$((i+1))
          done
          if [ "$SYNC" != "Synced" ] || [ "$HEALTH" != "Healthy" ]; then
            echo "ERROR: opendesk not ready within 45 minutes"; exit 1
          fi
          echo "ArgoCD reports OpenDesk healthy — verifying pod rollout..."
          for NS in opendesk nubus; do
            for d in $(kubectl get deployments -n "$NS" --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
              kubectl rollout status deployment/"$d" -n "$NS" --timeout=30m || true
            done
            for s in $(kubectl get statefulsets -n "$NS" --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
              kubectl rollout status statefulset/"$s" -n "$NS" --timeout=30m || true
            done
          done
          echo "OpenDesk ready — sending notification."

          python3 - <<PYEOF
          import smtplib, os, time
          from email.message import EmailMessage

          to       = os.environ["NOTIFY_TO"]
          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ.get("SMTP_USERNAME", "")
          password = os.environ.get("SMTP_PASSWORD", "")

          msg = EmailMessage()
          msg["Subject"] = "OpenDesk ready"
          msg["From"]    = "no-reply@your-domain.tld"
          msg["To"]      = to
          msg.set_content(
              "OpenDesk is Synced and Healthy.\n\n"
              "Keycloak, LDAP, UMC, and the OpenDesk portal are ready for use.\n"
              "\n"
              "Links:\n"
              "  Portal:      https://test34.your-domain.tld\n"
              "  Keycloak:    https://id.test34.your-domain.tld\n"
              "  Nextcloud:   https://nextcloud.test34.your-domain.tld\n"
              "  Collabora:   https://collabora.test34.your-domain.tld\n"
          )

          for attempt in range(1, 11):
              try:
                  with smtplib.SMTP(host, port, timeout=10) as s:
                      s.ehlo(); s.starttls()
                      if username:
                          s.login(username, password)
                      s.send_message(msg)
                  print(f"Notification sent to {to}")
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/10 failed: {e}")
                  if attempt < 10:
                      time.sleep(30)
          else:
              raise RuntimeError("Failed to send notification after 10 attempts")
          PYEOF
