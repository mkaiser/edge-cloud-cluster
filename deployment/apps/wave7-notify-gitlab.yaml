# PostSync notification job: sends an email when GitLab is ready.
#
# HOW IT WORKS:
#   Runs at wave 7 PostSync (of argocd-main-app), after GitLab (wave 6) and
#   gitlab-runner (wave 7) have been applied. Polls until both the `gitlab`
#   and `gitlab-runner` apps report Synced+Healthy, then sends email.
#   Times out after 45 minutes.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notify-gitlab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notify-gitlab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  resourceNames: ["gitlab", "gitlab-runner"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["smtp-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notify-gitlab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notify-gitlab
subjects:
- kind: ServiceAccount
  name: notify-gitlab
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notify-gitlab
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 2700
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: notify-gitlab
      restartPolicy: Never
      containers:
      - name: notify
        image: docker.io/alpine/k8s:1.32.3
        env:
        - name: NOTIFY_TO
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: sendBootstrapFinishMailRecipient
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: port
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: password
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Waiting for gitlab and gitlab-runner to be Synced + Healthy..."

          i=0
          while [ "$i" -lt 270 ]; do
            all_ok=true
            status_line=""
            for APP in gitlab gitlab-runner; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || echo "Unknown")
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || echo "Unknown")
              status_line="${status_line}  [${APP}] sync=${SYNC} health=${HEALTH}\n"
              if [ "$SYNC" != "Synced" ] || [ "$HEALTH" != "Healthy" ]; then
                all_ok=false
              fi
            done

            if [ "$all_ok" = "true" ]; then
              echo "GitLab and GitLab Runner are Synced + Healthy — sending notification."
              break
            fi

            printf "Attempt ${i}/270:\n${status_line}  retrying in 10s...\n"
            sleep 10
            i=$((i+1))
          done

          if [ "$all_ok" != "true" ]; then
            echo "ERROR: gitlab/gitlab-runner did not reach Synced+Healthy within 45 minutes"
            exit 1
          fi

          python3 - <<PYEOF
          import smtplib, os, time
          from email.message import EmailMessage

          to       = os.environ["NOTIFY_TO"]
          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ.get("SMTP_USERNAME", "")
          password = os.environ.get("SMTP_PASSWORD", "")

          msg = EmailMessage()
          msg["Subject"] = "GitLab ready"
          msg["From"]    = "no-reply@your-domain.tld"
          msg["To"]      = to
          msg.set_content(
              "GitLab and GitLab Runner are Synced and Healthy.\n\n"
              "GitLab is ready at https://gitlab.test34.your-domain.tld\n"
              "Registry: https://registry.gitlab.test34.your-domain.tld\n"
          )

          for attempt in range(1, 11):
              try:
                  with smtplib.SMTP(host, port, timeout=10) as s:
                      s.ehlo(); s.starttls()
                      if username:
                          s.login(username, password)
                      s.send_message(msg)
                  print(f"Notification sent to {to}")
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/10 failed: {e}")
                  if attempt < 10:
                      time.sleep(30)
          else:
              raise RuntimeError("Failed to send notification after 10 attempts")
          PYEOF
