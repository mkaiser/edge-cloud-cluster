# ArgoCD Application: opendesk-parent (app-of-apps)
# Deploys the opendesk-parent chart, which creates a child Application
# pointing to charts/opendesk, which in turn creates the 23 openDesk component apps.
# Pattern: https://gitlab.opencode.de/bmi/opendesk/deployment/options/argocd-deploy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opendesk
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: git@github.com:owner/repo.git
    targetRevision: main
    path: deployment/opendesk-apps/charts/opendesk
    helm:
      values: |
        argo:
          syncPolicy:
            automated:
              prune: false
              selfHeal: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
