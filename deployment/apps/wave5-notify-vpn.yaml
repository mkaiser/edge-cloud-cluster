# PostSync notification: sends an email when VPN services and Renovate are ready.
# Fires at PostSync wave 5, after wave5-barrier confirmed headscale (wave 4),
# renovate (wave 4), and headplane (wave 5) are all Synced+Healthy.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notify-vpn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notify-vpn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  resourceNames: ["headscale", "headplane", "renovate"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["smtp-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: notify-vpn-rollout
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notify-vpn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notify-vpn
subjects:
- kind: ServiceAccount
  name: notify-vpn
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: notify-vpn-rollout
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: notify-vpn-rollout
subjects:
- kind: ServiceAccount
  name: notify-vpn
  namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notify-vpn
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: notify-vpn
      restartPolicy: Never
      containers:
      - name: notify
        image: docker.io/alpine/k8s:1.32.3
        env:
        - name: NOTIFY_TO
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: sendBootstrapFinishMailRecipient
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: port
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: password
        command: ["/bin/sh", "-ec"]
        args:
        - |
          for APP in headscale headplane renovate; do
            i=0
            while [ "$i" -lt 180 ]; do
              SYNC=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.sync.status}" 2>/dev/null || true)
              HEALTH=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.health.status}" 2>/dev/null || true)
              PHASE=$(kubectl get application "$APP" -n argocd \
                -o jsonpath="{.status.operationState.phase}" 2>/dev/null || true)
              [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && [ "$PHASE" != "Running" ] && break
              echo "  ${APP}: sync=${SYNC} health=${HEALTH} phase=${PHASE} — waiting 10s..."
              sleep 10; i=$((i+1))
            done
            if [ "$SYNC" != "Synced" ] || [ "$HEALTH" != "Healthy" ]; then
              echo "ERROR: ${APP} not ready within 30 minutes"; exit 1
            fi
          done
          echo "ArgoCD reports VPN services healthy — verifying pod rollout..."
          for NS in headscale headplane renovate; do
            for d in $(kubectl get deployments -n "$NS" --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
              kubectl rollout status deployment/"$d" -n "$NS" --timeout=10m || true
            done
          done
          echo "VPN services and Renovate ready — sending notification."

          python3 - <<PYEOF
          import smtplib, os, time
          from email.message import EmailMessage

          to       = os.environ["NOTIFY_TO"]
          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ.get("SMTP_USERNAME", "")
          password = os.environ.get("SMTP_PASSWORD", "")

          msg = EmailMessage()
          msg["Subject"] = "VPN + Renovate ready"
          msg["From"]    = "no-reply@your-domain.tld"
          msg["To"]      = to
          msg.set_content(
              "VPN services and Renovate are Synced and Healthy.\n\n"
              "Ready:\n"
              "  - headscale (VPN server)\n"
              "  - headplane (VPN management UI)\n"
              "  - renovate (dependency updates)\n"
              "\n"
              "Links:\n"
              "  Headplane:   https://headplane.test34.your-domain.tld\n"
          )

          for attempt in range(1, 11):
              try:
                  with smtplib.SMTP(host, port, timeout=10) as s:
                      s.ehlo(); s.starttls()
                      if username:
                          s.login(username, password)
                      s.send_message(msg)
                  print(f"Notification sent to {to}")
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/10 failed: {e}")
                  if attempt < 10:
                      time.sleep(30)
          else:
              raise RuntimeError("Failed to send notification after 10 attempts")
          PYEOF
