# Longhorn recurring backup jobs.
# Applied to all volumes via the default RecurringJob group.
# Snapshots stay on-node (fast, no S3 cost); backups go to S3 (survives full cluster loss).
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-hourly
  namespace: longhorn-system
spec:
  cron: "0 * * * *"
  task: snapshot
  retain: 6
  concurrency: 10
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  cron: "30 2 * * *"
  task: backup
  retain: 7
  concurrency: 1
  groups:
    - default
